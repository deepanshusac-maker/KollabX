<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="icon" type="image/svg+xml" href="assets/images/logo11.svg">
  <link rel="preconnect" href="https://ssoqnnokeuxznfdyihob.supabase.co">
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link rel="preconnect" href="https://plausible.io">
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <meta property="og:image" content="assets/images/og-image.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KollabX — Team Chat</title>
  <meta name="description" content="KollabX — where student teams collaborate, plan projects, and build together." />
  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/chat.css" />
  <link rel="stylesheet" href="css/toast.css" />
  <!-- Lucide Icons -->
  <script defer src="https://unpkg.com/lucide@0.400.0"></script>
  <!-- Supabase Client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Simple Analytics Placeholder -->
  <script defer data-domain="kollabx.com" src="https://plausible.io/js/script.js"></script>
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

  <div class="chat-layout" id="chatLayout">

    <!-- ===== Sidebar ===== -->
    <aside class="sidebar" id="sidebar">

      <!-- Brand -->
      <div class="sidebar-brand">
        <a href="index.html" class="sidebar-brand-link"
          style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
          <img src="assets/images/logo11.svg" alt="KollabX Logo" class="sidebar-logo"
            style="width: 40px; height: 40px; border-radius: 10px; object-fit: contain;">
          <h1 style="font-size: 1.4rem; font-weight: 800; letter-spacing: -0.04em;">KollabX</h1>
        </a>
        <div class="brand-sub">Team Collaboration</div>
      </div>

      <!-- Team Selector -->
      <div class="team-selector">
        <button class="team-select-btn" id="teamSelectBtn">
          <span class="team-icon" id="teamIcon"></span>
          <span class="team-meta">
            <span class="team-label" id="teamLabel"></span>
            <span class="team-member-count" id="teamMemberCount"></span>
          </span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9" />
          </svg>
        </button>
        <div class="team-dropdown" id="teamDropdown"></div>
      </div>

      <!-- Channels -->
      <div class="sidebar-section" id="channelListContainer">
        <div class="sidebar-section-title">Channels</div>
        <div class="channel-list" id="channelList"></div>
      </div>

      <!-- Members -->
      <div class="members-section" id="membersSection">
        <div class="sidebar-section-title">Team Members</div>
        <div id="memberList"></div>
      </div>

      <!-- Current User -->
      <div class="sidebar-user" id="sidebarUser"></div>
    </aside>

    <!-- ===== Chat Area ===== -->
    <main class="chat-main" id="chatMain">

      <header class="chat-header" id="chatHeader">
        <button class="back-button" id="backButton" aria-label="Back">
          <i data-lucide="chevron-left"></i>
        </button>
        <div class="chat-header-channel" id="headerChannel"></div>
        <div class="chat-header-right" id="headerRight"></div>
      </header>

      <div class="chat-body" id="chatBody"></div>

      <div class="chat-input-area">
        <div class="chat-input-wrapper">
          <button class="input-icon-btn" aria-label="Attach file">
            <i data-lucide="paperclip"></i>
          </button>
          <textarea class="chat-textarea" id="chatTextarea" placeholder="Message #general…" rows="1"></textarea>
          <button class="send-button" id="sendButton" aria-label="Send message">
            <i data-lucide="send"></i>
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- Create Channel Modal (team leader only) -->
  <div class="chat-modal-overlay" id="createChannelModal" aria-hidden="true">
    <div class="chat-modal">
      <h2 class="chat-modal-title">Create channel</h2>
      <p class="chat-modal-hint">You can create up to 2 custom channels (plus #general).</p>
      <label class="chat-modal-label" for="newChannelName">Name</label>
      <input type="text" id="newChannelName" class="chat-modal-input" placeholder="e.g. dev, ideas" maxlength="80" />
      <label class="chat-modal-label" for="newChannelDesc">Description (optional)</label>
      <input type="text" id="newChannelDesc" class="chat-modal-input" placeholder="Short description" />
      <div class="chat-modal-actions">
        <button type="button" class="chat-modal-btn secondary" onclick="closeCreateChannelModal()">Cancel</button>
        <button type="button" class="chat-modal-btn primary" id="createChannelSubmit">Create</button>
      </div>
    </div>
  </div>

  <!-- Edit Channel Modal (team leader only) -->
  <div class="chat-modal-overlay" id="editChannelModal" aria-hidden="true">
    <div class="chat-modal">
      <h2 class="chat-modal-title">Edit channel</h2>
      <label class="chat-modal-label" for="editChannelName">Name</label>
      <input type="text" id="editChannelName" class="chat-modal-input" placeholder="e.g. dev, ideas" maxlength="80" />
      <label class="chat-modal-label" for="editChannelDesc">Description (optional)</label>
      <input type="text" id="editChannelDesc" class="chat-modal-input" placeholder="Short description" />
      <div class="chat-modal-actions">
        <button type="button" class="chat-modal-btn secondary" onclick="closeEditChannelModal()">Cancel</button>
        <button type="button" class="chat-modal-btn primary" id="editChannelSubmit">Save</button>
      </div>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/auth.js" defer></script>
  <script src="js/teams.js" defer></script>
  <script src="js/toast.js" defer></script>
  <script src="js/chat.js" defer></script>
  <script src="js/analytics.js" defer></script>
  <script src="js/cookie-consent.js" defer></script>
</body>

</html>
