<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KollabX - Join Project</title>
    <link rel="stylesheet" href="css/main.css">
    <!-- Lucide Icons -->
    <script defer src="https://unpkg.com/lucide@0.400.0"></script>
    <style>
        .invite-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: radial-gradient(circle at top right, rgba(179, 82, 106, 0.05), transparent),
                radial-gradient(circle at bottom left, rgba(82, 179, 155, 0.05), transparent);
        }

        .invite-card {
            background: var(--surface-light);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .invite-icon {
            width: 80px;
            height: 80px;
            background: rgba(179, 82, 106, 0.1);
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .invite-icon svg {
            width: 40px;
            height: 40px;
        }

        .invite-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .invite-desc {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .invite-project-details {
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }

        .detail-item {
            margin-bottom: 1rem;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-mist);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 500;
        }

        .btn-join {
            width: 100%;
            padding: 1rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(179, 82, 106, 0.3);
        }

        .btn-join:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(179, 82, 106, 0.4);
            filter: brightness(1.1);
        }

        .btn-join:disabled {
            background: var(--surface-light);
            color: var(--text-mist);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="invite-container">
        <div class="invite-card" id="invite-card">
            <div class="invite-icon">
                <i data-lucide="loader" class="loader" style="display: block; border: none; animation: spin 2s linear infinite; width: 40px; height: 40px; color: var(--primary-color);"></i>
            </div>
            <h1 class="invite-title">Validating Invite...</h1>
            <p class="invite-desc">Please wait while we cross-check your invitation link securely.</p>
        </div>
    </div>

    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/invite.js" defer></script>
</body>

</html>
