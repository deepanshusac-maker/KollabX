<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <meta property="og:image" content="assets/images/og-image.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KollabX - Post</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/toast.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.400.0"></script>
    <script src="https://browser.sentry-cdn.com/7.114.0/bundle.min.js"
        integrity="sha384-N89u6N+7+t1N917N89u6N+7+t1N917N89u6N+7+t1N91" crossorigin="anonymous"></script>
    <script>
        if (window.Sentry) {
            Sentry.init({ dsn: "YOUR_DSN_HERE" });
        }
    </script>
    <!-- Simple Analytics Placeholder -->
    <script defer data-domain="kollabx.com" src="https://plausible.io/js/script.js"></script>
</head>

<body class="auth-loading-state">
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <img src="assets/images/logo11.svg" alt="KollabX Logo" class="navbar-logo">
            <h1>KollabX</h1>
        </a>
        <div class="mobile-overlay"></div>
        <ul class="nav-links">
            <li><a href="index.html" class="nav-item">Home</a></li>
            <li><a href="explore.html" class="nav-item">Explore</a></li>
            <li class="nav-item-auth-only" style="display: none;"><a href="post.html" class="nav-item active">Post
                    Project</a>
            </li>
            <li class="nav-item-auth-only" style="display: none;"><a href="dashboard.html"
                    class="nav-item">Dashboard</a></li>

            <div class="nav-indicator"></div>
        </ul>
        <div class="nav-right">
            <button type="button" class="notification-icon" aria-label="Notifications">
                <i data-lucide="bell" aria-hidden="true"></i>
                <div class="notification-badge" aria-hidden="true" style="display: none;">0</div>
            </button>
            <a href="signin.html" class="btn-signin">Sign In</a>
            <button class="mobile-menu-toggle" aria-label="Toggle mobile menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
    </nav>

    <main class="profile-section">
        <div class="profile-container">
            <nav class="breadcrumbs" aria-label="Breadcrumb">
                <a href="index.html">Home</a>
                <span aria-hidden="true">/</span>
                <span aria-current="page">Post Project</span>
            </nav>
            <div class="profile-header">
                <h1 class="profile-title" id="post-page-title">Post Your Project</h1>
                <p id="post-page-subtitle">Post your project and find the perfect collaborators</p>
            </div>

            <form class="profile-card" id="create-post-form">
                <!-- Basic Info -->
                <div class="form-section">
                    <h3>Basic Info</h3>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="project-title">Project Title</label>
                            <input type="text" id="project-title" class="form-control"
                                placeholder="Smart Attendance using Face Recognition" required>
                        </div>
                        <div class="form-group">
                            <label for="main-category">Main Category</label>
                            <select id="main-category" class="form-control" required>
                                <option value="" disabled selected>Select main category</option>
                                <option value="Technical">Technical</option>
                                <option value="Sports">Sports</option>
                                <option value="Cultural">Cultural</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="category">Sub Category</label>
                            <select id="category" class="form-control" required disabled>
                                <option value="" disabled selected>Select main category first</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Description -->
                <div class="form-section">
                    <h3>Description</h3>
                    <div class="form-group">
                        <textarea id="description" class="form-control"
                            placeholder="Explain your idea, features, goals and what you want to build..." required
                            maxlength="2000"></textarea>
                    </div>
                </div>

                <!-- Team Requirements -->
                <div class="form-section">
                    <h3>Team Requirements</h3>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="required-skills">Required Skills</label>
                            <input type="text" id="required-skills" class="form-control"
                                placeholder="React, Python, UI/UX, Arduino" required>
                        </div>
                        <div class="form-group">
                            <label for="team-size">Team Size</label>
                            <input type="number" id="team-size" class="form-control" placeholder="2" min="2" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="roles-needed">Roles Needed</label>
                        <input type="text" id="roles-needed" class="form-control"
                            placeholder="Frontend Dev, ML Engineer, Designer">
                    </div>
                </div>

                <!-- Additional Details -->
                <div class="form-section">
                    <h3>Additional Details</h3>
                    <div class="form-group-row">
                        <div class="form-group">
                            <label for="timeline">Timeline</label>
                            <select id="timeline" class="form-control">
                                <option value="1-week">1 Week (Hackathon)</option>
                                <option value="1-month">1 Month</option>
                                <option value="3-months">3 Months</option>
                                <option value="long-term">Long Term</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="visibility">Visibility</label>
                            <select id="visibility" class="form-control">
                                <option value="public">Public</option>
                                <option value="private">Private</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div style="margin-top: 3rem; display: flex; justify-content: flex-end; gap: 1rem;">
                    <button type="button" id="cancel-post" class="btn-signin"
                        style="padding: 1rem 3rem; font-size: 1rem; cursor: pointer; background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color);">Cancel</button>
                    <button type="submit" id="submit-post" class="btn-signin"
                        style="padding: 1rem 3rem; font-size: 1rem; cursor: pointer;">Post Project</button>
                </div>
            </form>
        </div>
    </main>



    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/session.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/projects.js"></script>
    <script src="js/main.js"></script>
    <script src="js/form-validation.js"></script>
    <script src="js/toast.js"></script>
    <script>
        // Initialize auth and protect route
        window.addEventListener('DOMContentLoaded', async () => {
            // Check authentication
            const isAuth = await window.session.requireAuth();
            if (isAuth) {
                await window.session.initAuth();
            }
            // Initialize Lucide Icons
            lucide.createIcons();

            // Category hierarchy definition
            const categoryHierarchy = {
                'Technical': ['Web Development', 'AI/ML', 'Robotics', 'IoT', 'Blockchain', 'Cybersecurity', 'Data Science'],
                'Sports': ['Cricket', 'Football', 'Basketball', 'Badminton', 'Other Sports'],
                'Cultural': ['Dance', 'Music', 'Drama', 'Art & Design', 'Other Cultural']
            };

            // Reverse lookup: sub-category → main category
            function getMainCategory(subCategory) {
                for (const [main, subs] of Object.entries(categoryHierarchy)) {
                    if (subs.includes(subCategory)) return main;
                }
                return '';
            }

            // Dynamic sub-category population
            const mainCatSelect = document.getElementById('main-category');
            const subCatSelect = document.getElementById('category');

            function populateSubCategories(mainCategory, preselect) {
                const subs = categoryHierarchy[mainCategory] || [];
                subCatSelect.innerHTML = '<option value="" disabled selected>Select sub category</option>';
                subs.forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub;
                    opt.textContent = sub;
                    subCatSelect.appendChild(opt);
                });
                subCatSelect.disabled = false;
                if (preselect) subCatSelect.value = preselect;
            }

            mainCatSelect.addEventListener('change', () => {
                populateSubCategories(mainCatSelect.value);
            });

            const postForm = document.getElementById('create-post-form');
            const submitButton = document.getElementById('submit-post');
            const pageTitle = document.getElementById('post-page-title');
            const pageSubtitle = document.getElementById('post-page-subtitle');

            const params = new URLSearchParams(window.location.search);
            const editProjectId = params.get('edit');


            // If editing, load the project and prefill the form
            if (editProjectId) {
                try {
                    if (pageTitle) pageTitle.textContent = 'Edit Your Project';
                    if (pageSubtitle) pageSubtitle.textContent = 'Update your project details. Only you can edit your project.';
                    submitButton.textContent = 'Update Project';

                    const result = await window.projects.getProjectById(editProjectId);
                    if (!result.success || !result.data) {
                        window.toast.error('Could not load your project for editing.');
                        setTimeout(() => (window.location.href = 'explore.html'), 600);
                        return;
                    }

                    const project = result.data;

                    // Prefill fields
                    document.getElementById('project-title').value = project.title || '';

                    // Handle category prefill with hierarchy
                    const savedCategory = project.category || '';
                    const mainCat = getMainCategory(savedCategory);
                    if (mainCat) {
                        mainCatSelect.value = mainCat;
                        populateSubCategories(mainCat, savedCategory);
                    } else if (savedCategory) {
                        // Legacy category - try to place it under Technical as fallback
                        mainCatSelect.value = 'Technical';
                        populateSubCategories('Technical', savedCategory);
                    }

                    document.getElementById('description').value = project.description || '';
                    document.getElementById('required-skills').value = Array.isArray(project.required_skills) ? project.required_skills.join(', ') : '';
                    document.getElementById('team-size').value = project.team_size || 1;
                    document.getElementById('roles-needed').value = Array.isArray(project.roles_needed) ? project.roles_needed.join(', ') : '';
                    document.getElementById('timeline').value = project.timeline || '1-week';
                    document.getElementById('visibility').value = project.visibility || 'public';

                } catch (err) {
                    console.error('Edit mode load error:', err);
                    window.toast.error(getUserFriendlyError ? getUserFriendlyError(err) : 'Could not load project.');
                }
            }

            // Setup real-time validation
            setupRealTimeValidation(postForm, {
                'description': [validators.minLength(20)],
                'team-size': [validators.number, validators.minNumber(2)]
            });

            postForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                // Validate form
                const fieldRules = {
                    'description': [validators.minLength(20)],
                    'team-size': [validators.number, validators.minNumber(2)]
                };

                if (!validateForm(postForm, fieldRules)) {
                    showFormError('Please fix the errors above before posting.');
                    return;
                }

                // Show loading state
                showLoading(submitButton, 'Post Project');

                try {
                    // Prepare project data
                    const postData = {
                        title: document.getElementById('project-title').value.trim(),
                        category: document.getElementById('category').value,
                        description: document.getElementById('description').value.trim(),
                        requiredSkills: document.getElementById('required-skills').value,
                        teamSize: document.getElementById('team-size').value,
                        rolesNeeded: document.getElementById('roles-needed').value || '',
                        timeline: document.getElementById('timeline').value || null,
                        visibility: document.getElementById('visibility').value || 'public'
                    };

                    // Create/update project in database
                    const result = editProjectId
                        ? await window.projects.updateProject(editProjectId, postData)
                        : await window.projects.createProject(postData);

                    if (result.success) {
                        // Show success message
                        window.toast.success(editProjectId ? 'Project updated successfully! Redirecting...' : 'Project posted successfully! Redirecting...');

                        // Redirect after short delay
                        setTimeout(() => {
                            window.location.href = editProjectId ? 'explore.html' : 'index.html';
                        }, 1500);
                    } else {
                        hideLoading(submitButton);
                        const friendlyError = getUserFriendlyError(result.error || new Error(editProjectId ? 'Failed to update project' : 'Failed to post project'));
                        showFormError(friendlyError);
                    }
                } catch (error) {
                    hideLoading(submitButton);
                    console.error('Post project error:', error);
                    const friendlyError = getUserFriendlyError(error);
                    showFormError(friendlyError);
                }
            });

            document.getElementById('cancel-post').addEventListener('click', () => {
                if (confirm('Are you sure you want to cancel? Your changes will be lost.')) {
                    window.location.href = 'explore.html';
                }
            });
        });
    </script>
</body>

</html>
